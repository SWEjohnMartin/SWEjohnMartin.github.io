<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thank You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #4cafaf, #2e7d7d);
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        text-align: center;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .checkmark {
        font-size: 60px;
        color: #4ca8af;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        color: #2e787d;
      }

      p {
        font-size: 16px;
        margin-bottom: 25px;
        color: #555;
      }

      .btn {
        display: inline-block;
        padding: 12px 25px;
        background-color: #4cafa7;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
        transition: background 0.3s ease;
      }

      .btn:hover {
        background-color: #388e87;
      }

      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="checkmark">✔</div>
      <h1>Thank You!</h1>
      <p>
        Your submission has been received successfully. We’ll be in touch with
        you shortly.
      </p>

      <a href="/" class="btn">Back to Home</a>

      <div class="footer">
        If you have any questions, feel free to contact us.
      </div>
    </div>
  </body>
</html>
